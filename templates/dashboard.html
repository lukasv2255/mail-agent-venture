<!doctype html>
<html lang="cs">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mail Agent — Dashboard</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        background: #111;
        color: #e0e0e0;
        font-family: "Segoe UI", sans-serif;
        font-size: 14px;
        padding: 24px;
        max-width: 800px;
        margin: 0 auto;
      }

      h1 {
        font-size: 1.3rem;
        margin-bottom: 6px;
      }

      .meta {
        font-size: 11px;
        color: #555;
        margin-bottom: 24px;
      }
      .meta span {
        margin-right: 16px;
      }
      .badge {
        display: inline-block;
        padding: 2px 8px;
        border-radius: 4px;
        font-size: 10px;
        font-weight: bold;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }
      .badge.dry {
        background: #333;
        color: #888;
      }
      .badge.live {
        background: #1a3a1a;
        color: #4caf50;
      }

      /* Karta čekajícího emailu */
      #pending-card {
        background: #1a1a1a;
        border: 1px solid #2a2a2a;
        border-radius: 8px;
        padding: 20px;
        margin-bottom: 20px;
      }
      #pending-card.empty {
        border-color: #1a1a1a;
        color: #444;
        text-align: center;
        padding: 40px;
      }

      .email-meta {
        margin-bottom: 16px;
      }
      .email-meta .row {
        display: flex;
        gap: 8px;
        margin-bottom: 4px;
        font-size: 12px;
      }
      .email-meta .label {
        color: #555;
        min-width: 70px;
      }
      .email-meta .value {
        color: #e0e0e0;
      }
      .email-meta .type-badge {
        display: inline-block;
        padding: 1px 8px;
        border-radius: 4px;
        font-size: 11px;
        font-weight: bold;
        background: #1a2a3a;
        color: #4db6ff;
      }

      .section-label {
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        color: #555;
        margin-bottom: 8px;
      }

      .draft-box {
        background: #0d0d0d;
        border: 1px solid #222;
        border-radius: 6px;
        padding: 14px;
        font-size: 13px;
        line-height: 1.6;
        color: #ccc;
        white-space: pre-wrap;
        margin-bottom: 20px;
      }

      .actions {
        display: flex;
        gap: 12px;
      }
      button {
        flex: 1;
        padding: 12px;
        border: none;
        border-radius: 6px;
        font-size: 14px;
        font-weight: bold;
        cursor: pointer;
        transition: opacity 0.15s;
      }
      button:hover {
        opacity: 0.85;
      }
      button:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }
      #btn-approve {
        background: #2d5a2d;
        color: #7ecf7e;
      }
      #btn-reject {
        background: #3a1f1f;
        color: #cf7e7e;
      }

      .alert-card {
        background: #1a1a1a;
        border: 1px solid #3a2020;
        border-left: 3px solid #c44;
        border-radius: 8px;
        padding: 14px 16px;
        margin-bottom: 10px;
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 12px;
      }
      .alert-card.unk {
        border-left-color: #666;
        border-color: #2a2a2a;
      }
      .alert-info {
        flex: 1;
        font-size: 12px;
      }
      .alert-info .alert-type {
        font-size: 10px;
        font-weight: bold;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        margin-bottom: 4px;
        color: #c44;
      }
      .alert-card.unk .alert-type {
        color: #666;
      }
      .alert-info .alert-from {
        color: #e0e0e0;
        margin-bottom: 2px;
      }
      .alert-info .alert-subject {
        color: #888;
      }
      .alert-dismiss {
        background: none;
        border: 1px solid #333;
        color: #555;
        padding: 4px 10px;
        border-radius: 4px;
        cursor: pointer;
        font-size: 11px;
        flex: none;
      }
      .alert-dismiss:hover {
        border-color: #555;
        color: #999;
        opacity: 1;
      }

      #status {
        font-size: 11px;
        color: #555;
        margin-top: 12px;
        min-height: 16px;
      }
      #status.error {
        color: #c44;
      }
      #status.ok {
        color: #4a4;
      }
    </style>
  </head>
  <body>
    <div
      style="
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 6px;
      "
    >
      <h1>Mail Agent</h1>
      <button
        id="btn-check"
        onclick="triggerCheck()"
        style="
          flex: none;
          padding: 6px 14px;
          font-size: 12px;
          background: #1a2a1a;
          color: #4caf50;
          border: 1px solid #2a4a2a;
          border-radius: 6px;
          cursor: pointer;
        "
      >
        🔍 Check now
      </button>
    </div>
    <div class="meta">
      <span id="meta-client">—</span>
      <span id="meta-mode"></span>
      <span id="meta-queue" style="color: #666"></span>
    </div>

    <div id="pending-card" class="empty">Načítám...</div>
    <div id="esc-section"></div>
    <div id="unk-section"></div>

    <div id="status"></div>

    <script>
      const REFRESH_MS = 5000;
      let _isPolling = false;

      async function refresh() {
        try {
          const res = await fetch("/api/status");
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          const data = await res.json();

          // Meta
          document.getElementById("meta-client").textContent =
            `📬 ${data.mail_client}`;
          const modeEl = document.getElementById("meta-mode");
          modeEl.innerHTML = data.dry_run
            ? '<span class="badge dry">DRY RUN</span>'
            : '<span class="badge live">PRODUKCE</span>';
          const queueEl = document.getElementById("meta-queue");
          queueEl.textContent =
            data.queue_remaining > 0
              ? `· ve frontě ještě ${data.queue_remaining}`
              : "";

          // ESC a UNK sekce
          const escAlerts = (data.alerts || []).filter(
            (a) => a.email_type === "ESC",
          );
          const unkAlerts = (data.alerts || []).filter(
            (a) => a.email_type === "UNK",
          );

          const escEl = document.getElementById("esc-section");
          escEl.innerHTML =
            escAlerts.length > 0
              ? `
            <div class="section-label" style="margin-top:24px">🚨 Eskalace — vyžaduje ruční odpověď</div>
            ${escAlerts
              .map((a) => {
                const i = data.alerts.indexOf(a);
                return `<div class="alert-card">
                <div class="alert-info">
                  <div class="alert-from">${esc(a.from)}</div>
                  <div class="alert-subject">${esc(a.subject)}</div>
                </div>
                <button class="alert-dismiss" onclick="dismissAlert(${i})">Vyřízeno</button>
              </div>`;
              })
              .join("")}`
              : "";

          const unkEl = document.getElementById("unk-section");
          unkEl.innerHTML =
            unkAlerts.length > 0
              ? `
            <div class="section-label" style="margin-top:24px">⚪ Neznámé — zkontroluj ručně</div>
            ${unkAlerts
              .map((a) => {
                const i = data.alerts.indexOf(a);
                return `<div class="alert-card unk">
                <div class="alert-info">
                  <div class="alert-from">${esc(a.from)}</div>
                  <div class="alert-subject">${esc(a.subject)}</div>
                </div>
                <button class="alert-dismiss" onclick="dismissAlert(${i})">Vyřízeno</button>
              </div>`;
              })
              .join("")}`
              : "";

          // Pending
          const card = document.getElementById("pending-card");
          if (!data.pending) {
            if (!_isPolling) {
              card.className = "empty";
              card.innerHTML = "⏳ Čekám na další email...";
            }
            return;
          }

          const p = data.pending;
          card.className = "";
          card.innerHTML = `
      <div class="email-meta">
        <div class="row"><span class="label">Od:</span><span class="value">${esc(p.from)}</span></div>
        <div class="row"><span class="label">Předmět:</span><span class="value">${esc(p.subject)}</span></div>
        <div class="row"><span class="label">Typ:</span><span class="type-badge">${esc(p.email_type)}</span></div>
      </div>
      <div class="section-label">Navrhovaná odpověď</div>
      <div class="draft-box">${esc(p.draft)}</div>
      <div class="actions">
        <button id="btn-approve" onclick="approve()">✅ Schválit a odeslat</button>
        <button id="btn-reject"  onclick="reject()">❌ Zamítnout</button>
      </div>
    `;

          setStatus("");
        } catch (err) {
          setStatus(`Chyba: ${err.message}`, "error");
        }
      }

      async function approve() {
        await action("/api/approve");
      }

      async function reject() {
        await action("/api/reject");
      }

      async function action(url) {
        // Optimistické UI — karta zmizí okamžitě
        _isPolling = true;
        const card = document.getElementById("pending-card");
        card.className = "empty";
        card.innerHTML = "⏳ Čekám na další email...";

        try {
          const res = await fetch(url, { method: "POST" });
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          pollForNext(8);
        } catch (err) {
          _isPolling = false;
          setStatus(`Chyba: ${err.message}`, "error");
          refresh();
        }
      }

      async function pollForNext(remaining) {
        if (remaining <= 0) {
          _isPolling = false;
          refresh();
          return;
        }
        try {
          const res = await fetch("/api/status");
          const data = await res.json();
          if (data.pending) {
            _isPolling = false;
            refresh();
          } else {
            setTimeout(() => pollForNext(remaining - 1), 1000);
          }
        } catch {
          setTimeout(() => pollForNext(remaining - 1), 1000);
        }
      }

      function setStatus(msg, cls = "") {
        const el = document.getElementById("status");
        el.textContent = msg;
        el.className = cls;
      }

      async function triggerCheck() {
        const btn = document.getElementById("btn-check");
        btn.disabled = true;
        btn.textContent = "⏳ Checkuji...";
        try {
          await fetch("/api/check", { method: "POST" });
          setTimeout(() => {
            btn.disabled = false;
            btn.textContent = "🔍 Check now";
          }, 3000);
        } catch (err) {
          btn.disabled = false;
          btn.textContent = "🔍 Check now";
        }
      }

      async function dismissAlert(index) {
        await fetch(`/api/alert/dismiss/${index}`, { method: "POST" });
        refresh();
      }

      function esc(str) {
        return String(str)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      refresh();
      setInterval(refresh, REFRESH_MS);
    </script>
  </body>
</html>
