<!doctype html>
<html lang="cs">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mail agent - template — Dashboard</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        background: #111;
        color: #e0e0e0;
        font-family: "Segoe UI", sans-serif;
        font-size: 14px;
        padding: 24px;
        max-width: 800px;
        margin: 0 auto;
      }

      h1 {
        font-size: 1.3rem;
        margin-bottom: 6px;
      }

      .meta {
        font-size: 11px;
        color: #555;
        margin-bottom: 24px;
      }
      .meta span {
        margin-right: 16px;
      }
      .badge {
        display: inline-block;
        padding: 2px 8px;
        border-radius: 4px;
        font-size: 10px;
        font-weight: bold;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }
      .badge.dry {
        background: #333;
        color: #888;
      }
      .badge.live {
        background: #1a3a1a;
        color: #4caf50;
      }
      .badge.auto {
        background: #1a2a3a;
        color: #4db6ff;
      }

      /* Karta čekajícího emailu */
      #pending-card {
        background: #1a1a1a;
        border: 1px solid #2a2a2a;
        border-radius: 8px;
        padding: 20px;
        margin-bottom: 20px;
      }
      #pending-card.empty {
        border-color: #1a1a1a;
        color: #444;
        text-align: center;
        padding: 40px;
      }

      .email-meta {
        margin-bottom: 16px;
      }
      .email-meta .row {
        display: flex;
        gap: 8px;
        margin-bottom: 4px;
        font-size: 12px;
      }
      .email-meta .label {
        color: #555;
        min-width: 70px;
      }
      .email-meta .value {
        color: #e0e0e0;
      }
      .email-meta .type-badge {
        display: inline-block;
        padding: 1px 8px;
        border-radius: 4px;
        font-size: 11px;
        font-weight: bold;
        background: #1a2a3a;
        color: #4db6ff;
      }

      .section-label {
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        color: #555;
        margin-bottom: 8px;
      }

      .draft-box {
        background: #0d0d0d;
        border: 1px solid #222;
        border-radius: 6px;
        padding: 14px;
        font-size: 13px;
        line-height: 1.6;
        color: #ccc;
        white-space: pre-wrap;
        margin-bottom: 20px;
      }

      .actions {
        display: flex;
        gap: 12px;
      }
      button {
        flex: 1;
        padding: 12px;
        border: none;
        border-radius: 6px;
        font-size: 14px;
        font-weight: bold;
        cursor: pointer;
        transition: opacity 0.15s;
      }
      button:hover {
        opacity: 0.85;
      }
      button:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }
      #btn-approve {
        background: #2d5a2d;
        color: #7ecf7e;
      }
      #btn-reject {
        background: #3a1f1f;
        color: #cf7e7e;
      }
      .detail-actions {
        display: flex;
        gap: 8px;
        margin-top: 12px;
      }
      .detail-action-btn {
        flex: none;
        padding: 8px 12px;
        font-size: 12px;
        border: 1px solid #4a2222;
        background: #2a1717;
        color: #e09a9a;
      }
      .detail-action-btn:hover {
        opacity: 1;
        border-color: #7a3333;
        color: #f0b0b0;
      }

      .alert-card {
        background: #1a1a1a;
        border: 1px solid #3a2020;
        border-left: 3px solid #c44;
        border-radius: 8px;
        padding: 14px 16px;
        margin-bottom: 10px;
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 12px;
      }
      .alert-card.unk {
        border-left-color: #666;
        border-color: #2a2a2a;
      }
      .alert-info {
        flex: 1;
        font-size: 12px;
      }
      .alert-info .alert-type {
        font-size: 10px;
        font-weight: bold;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        margin-bottom: 4px;
        color: #c44;
      }
      .alert-card.unk .alert-type {
        color: #666;
      }
      .alert-info .alert-from {
        color: #e0e0e0;
        margin-bottom: 2px;
      }
      .alert-info .alert-subject {
        color: #888;
      }
      .alert-dismiss {
        background: none;
        border: 1px solid #333;
        color: #555;
        padding: 4px 10px;
        border-radius: 4px;
        cursor: pointer;
        font-size: 11px;
        flex: none;
      }
      .alert-dismiss:hover {
        border-color: #555;
        color: #999;
        opacity: 1;
      }

      #status {
        font-size: 11px;
        color: #555;
        margin-top: 12px;
        min-height: 16px;
      }
      #status.error {
        color: #c44;
      }
      #status.ok {
        color: #4a4;
      }

      /* Historie */
      .history-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 12px;
      }
      .history-table th {
        text-align: left;
        color: #555;
        font-weight: normal;
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        padding: 6px 8px;
        border-bottom: 1px solid #222;
      }
      .history-table td {
        padding: 8px 8px;
        border-bottom: 1px solid #1a1a1a;
        vertical-align: top;
        color: #ccc;
      }
      .history-row:hover td {
        background: #161616;
        cursor: pointer;
      }
      .outcome-badge {
        display: inline-block;
        padding: 1px 7px;
        border-radius: 3px;
        font-size: 10px;
        font-weight: bold;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }
      .outcome-approved {
        background: #1a3a1a;
        color: #4caf50;
      }
      .outcome-rejected {
        background: #3a1a1a;
        color: #cf5050;
      }
      .outcome-timeout {
        background: #2a2a1a;
        color: #aaa030;
      }
      .outcome-dry_run {
        background: #1a1a2a;
        color: #5090cf;
      }
      .outcome-escalated {
        background: #3a2020;
        color: #cf7070;
      }
      .outcome-unknown {
        background: #222;
        color: #666;
      }
      .outcome-auto {
        background: #1a2a3a;
        color: #4db6ff;
        min-width: 20px;
        text-align: center;
      }

      /* Stránkování */
      .pagination {
        display: flex;
        gap: 4px;
        margin-top: 12px;
        flex-wrap: wrap;
      }
      .page-btn {
        flex: none;
        padding: 4px 10px;
        border: 1px solid #2a2a2a;
        border-radius: 4px;
        background: none;
        color: #555;
        font-size: 11px;
        cursor: pointer;
      }
      .page-btn:hover {
        border-color: #444;
        color: #999;
        opacity: 1;
      }
      .page-btn.active {
        border-color: #4db6ff;
        color: #4db6ff;
        background: #0d1a26;
      }
      .history-detail {
        display: none;
        background: #0d0d0d;
        border-bottom: 1px solid #222;
      }
      .history-detail.open {
        display: table-row;
      }
      .history-detail td {
        padding: 12px 16px;
        border-bottom: 1px solid #222;
      }
      .detail-label {
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: #555;
        margin-bottom: 4px;
        margin-top: 12px;
      }
      .detail-label:first-child {
        margin-top: 0;
      }
      .detail-text {
        white-space: pre-wrap;
        color: #aaa;
        line-height: 1.5;
        font-size: 12px;
      }
      .chevron {
        display: inline-block;
        color: #444;
        font-size: 16px;
        line-height: 1;
        transition: transform 0.15s;
        transform: rotate(0deg);
      }
      .chevron.open {
        transform: rotate(90deg);
      }
    </style>
  </head>
  <body>
    <div
      style="
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 6px;
      "
    >
      <h1>Mail agent Venture</h1>
      <button
        id="btn-check"
        onclick="triggerCheck()"
        style="
          flex: none;
          padding: 6px 14px;
          font-size: 12px;
          background: #1a2a1a;
          color: #4caf50;
          border: 1px solid #2a4a2a;
          border-radius: 6px;
          cursor: pointer;
        "
      >
        🔍 Check now
      </button>
    </div>
    <div class="meta">
      <span id="meta-client">—</span>
      <span id="meta-mode"></span>
      <span id="meta-queue" style="color: #666"></span>
    </div>

    <div id="pending-card" class="empty">Načítám...</div>
    <div id="esc-section"></div>
    <div id="unk-section"></div>

    <div id="history-section" style="margin-top: 32px"></div>
    <div id="sorter-history-section" style="margin-top: 32px"></div>
    <div id="status"></div>

    <script>
      const REFRESH_MS = 5000;
      let _isPolling = false;

      async function refresh() {
        try {
          const res = await fetch("/api/status");
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          const data = await res.json();

          // Responder-závislé prvky
          const btnCheck = document.getElementById("btn-check");
          const pendingCard = document.getElementById("pending-card");
          if (!data.responder_enabled) {
            btnCheck.style.display = "none";
            pendingCard.style.display = "none";
          } else {
            btnCheck.style.display = "";
            pendingCard.style.display = "";
          }

          // Meta
          document.getElementById("meta-client").textContent =
            `📬 ${data.mail_client}`;
          const modeEl = document.getElementById("meta-mode");
          if (data.dry_run) {
            modeEl.innerHTML = '<span class="badge dry">DRY RUN</span>';
          } else if (data.auto_respond) {
            modeEl.innerHTML =
              '<span class="badge live">PRODUKCE</span> <span class="badge auto">AUTO</span>';
          } else {
            modeEl.innerHTML = '<span class="badge live">PRODUKCE</span>';
          }
          const queueEl = document.getElementById("meta-queue");
          queueEl.textContent =
            data.queue_remaining > 0
              ? `· ve frontě ještě ${data.queue_remaining}`
              : "";

          // ESC a UNK sekce
          const escAlerts = (data.alerts || []).filter(
            (a) => a.email_type === "ESC",
          );
          const unkAlerts = (data.alerts || []).filter(
            (a) => a.email_type === "UNK",
          );

          const escEl = document.getElementById("esc-section");
          escEl.innerHTML =
            escAlerts.length > 0
              ? `
            <div class="section-label" style="margin-top:24px">🚨 Eskalace — vyžaduje ruční odpověď</div>
            ${escAlerts
              .map((a) => {
                const i = data.alerts.indexOf(a);
                return `<div class="alert-card">
                <div class="alert-info">
                  <div class="alert-from">${esc(a.from)}</div>
                  <div class="alert-subject">${esc(a.subject)}</div>
                </div>
                <button class="alert-dismiss" onclick="dismissAlert(${i})">Vyřízeno</button>
              </div>`;
              })
              .join("")}`
              : "";

          const unkEl = document.getElementById("unk-section");
          unkEl.innerHTML =
            unkAlerts.length > 0
              ? `
            <div class="section-label" style="margin-top:24px">⚪ Neznámé — zkontroluj ručně</div>
            ${unkAlerts
              .map((a) => {
                const i = data.alerts.indexOf(a);
                return `<div class="alert-card unk">
                <div class="alert-info">
                  <div class="alert-from">${esc(a.from)}</div>
                  <div class="alert-subject">${esc(a.subject)}</div>
                </div>
                <button class="alert-dismiss" onclick="dismissAlert(${i})">Vyřízeno</button>
              </div>`;
              })
              .join("")}`
              : "";

          // Pending
          const card = document.getElementById("pending-card");
          if (!data.pending) {
            if (!_isPolling) {
              card.className = "empty";
              card.innerHTML = "⏳ Čekám na další email...";
            }
            return;
          }

          const p = data.pending;
          card.className = "";
          card.innerHTML = `
      <div class="email-meta">
        <div class="row"><span class="label">Od:</span><span class="value">${esc(p.from)}</span></div>
        <div class="row"><span class="label">Předmět:</span><span class="value">${esc(p.subject)}</span></div>
        <div class="row"><span class="label">Typ:</span><span class="type-badge">${esc(p.email_type)}</span></div>
      </div>
      <div class="section-label">Navrhovaná odpověď</div>
      <div class="draft-box">${esc(p.draft)}</div>
      ${
        data.auto_respond
          ? ""
          : `
      <div class="actions">
        <button id="btn-approve" onclick="approve()">✅ Schválit a odeslat</button>
        <button id="btn-reject"  onclick="reject()">❌ Zamítnout</button>
      </div>`
      }
    `;

          setStatus("");
        } catch (err) {
          setStatus(`Chyba: ${err.message}`, "error");
        }
      }

      async function approve() {
        await action("/api/approve");
      }

      async function reject() {
        await action("/api/reject");
      }

      async function action(url) {
        // Optimistické UI — karta zmizí okamžitě
        _isPolling = true;
        const card = document.getElementById("pending-card");
        card.className = "empty";
        card.innerHTML = "⏳ Čekám na další email...";

        try {
          const res = await fetch(url, { method: "POST" });
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          refreshHistory();
          pollForNext(60);
        } catch (err) {
          _isPolling = false;
          setStatus(`Chyba: ${err.message}`, "error");
          refresh();
        }
      }

      async function pollForNext(remaining) {
        if (remaining <= 0) {
          _isPolling = false;
          refresh();
          return;
        }
        try {
          const res = await fetch("/api/status");
          const data = await res.json();
          if (data.pending) {
            _isPolling = false;
            refresh();
          } else {
            setTimeout(() => pollForNext(remaining - 1), 500);
          }
        } catch {
          setTimeout(() => pollForNext(remaining - 1), 500);
        }
      }

      function setStatus(msg, cls = "") {
        const el = document.getElementById("status");
        el.textContent = msg;
        el.className = cls;
      }

      async function triggerCheck() {
        const btn = document.getElementById("btn-check");
        btn.disabled = true;
        btn.textContent = "⏳ Checkuji...";
        try {
          await fetch("/api/check", { method: "POST" });
          setTimeout(() => {
            btn.disabled = false;
            btn.textContent = "🔍 Check now";
          }, 3000);
        } catch (err) {
          btn.disabled = false;
          btn.textContent = "🔍 Check now";
        }
      }

      async function dismissAlert(index) {
        await fetch(`/api/alert/dismiss/${index}`, { method: "POST" });
        refresh();
      }

      function esc(str) {
        return String(str)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      let _historyPage = 1;
      let _historyFilter = "all";

      async function refreshHistory(page, filter) {
        if (page !== undefined) _historyPage = page;
        if (filter !== undefined) {
          _historyFilter = filter;
          _historyPage = 1;
        }
        try {
          const res = await fetch(
            `/api/history?page=${_historyPage}&per_page=50&filter=${_historyFilter}`,
          );
          if (!res.ok) return;
          const data = await res.json();
          const el = document.getElementById("history-section");
          if (!data.total) {
            el.innerHTML = "";
            return;
          }

          const outcomeLabel = {
            approved: "✅ Odesláno",
            rejected: "❌ Zamítnuto",
            timeout: "⏰ Timeout",
            dry_run: "🔵 Dry run",
            escalated: "🚨 Eskalace",
            unknown: "⚪ Neznámý",
            auto: "✅ Odesláno",
          };

          const rows = data.items
            .map((item, i) => {
              const time = new Date(item.time).toLocaleString("cs-CZ", {
                day: "2-digit",
                month: "2-digit",
                hour: "2-digit",
                minute: "2-digit",
              });
              const cls =
                "outcome-" +
                (item.outcome === "auto" ? "approved" : item.outcome);
              const label = outcomeLabel[item.outcome] || item.outcome;
              const isAgentDecision =
                item.auto_mode ||
                item.outcome === "auto" ||
                item.outcome === "escalated" ||
                item.outcome === "unknown";
              const aBadge = isAgentDecision
                ? `<span class="outcome-badge outcome-auto" style="margin-right:4px">A</span>`
                : "";
              const hasDraft = item.draft && item.draft.trim().length > 0;
              return `
              <tr class="history-row" onclick="toggleDetail(${i})">
                <td style="color:#555;white-space:nowrap">${esc(time)}</td>
                <td style="max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(item.from)}</td>
                <td style="max-width:240px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(item.subject)}</td>
                <td><span class="type-badge">${esc(item.type)}</span></td>
                <td>${aBadge}<span class="outcome-badge ${cls}">${esc(label)}</span></td>
                <td style="text-align:right;padding-right:4px"><span class="chevron" id="arrow-${i}">›</span></td>
              </tr>
              <tr class="history-detail" id="detail-${i}">
                <td colspan="6">
                  <div class="detail-label">Původní email</div>
                  <div class="detail-text">${esc(item.body || "—")}</div>
                  ${hasDraft ? `<div class="detail-label">Navrhovaná odpověď</div><div class="detail-text">${esc(item.draft)}</div>` : ""}
                </td>
              </tr>`;
            })
            .join("");

          let pagination = "";
          if (data.pages > 1) {
            const cur = data.page,
              total = data.pages;
            const pages = new Set(
              [1, total, cur, cur - 2, cur - 1, cur + 1, cur + 2].filter(
                (p) => p >= 1 && p <= total,
              ),
            );
            const sorted = [...pages].sort((a, b) => a - b);
            const btns = [];
            let prev = null;
            for (const p of sorted) {
              if (prev && p - prev > 1)
                btns.push(`<span style="color:#333;padding:4px 6px">…</span>`);
              btns.push(
                `<button class="page-btn${p === cur ? " active" : ""}" onclick="refreshHistory(${p})">${p}</button>`,
              );
              prev = p;
            }
            pagination = `<div class="pagination">${btns.join("")}</div>`;
          }

          const filters = [
            { key: "all", label: "Vše" },
            { key: "auto", label: "A" },
            { key: "unk", label: "Neznámý" },
            { key: "esc", label: "Eskalace" },
            { key: "resolved", label: "Vyřízeno" },
          ];
          const filterTabs = filters
            .map(
              (f) =>
                `<button class="page-btn${_historyFilter === f.key ? " active" : ""}"
              onclick="refreshHistory(1, '${f.key}')">${f.label}</button>`,
            )
            .join("");

          el.innerHTML = `
            <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
              <span class="section-label">📋 Historie (${data.total})</span>
              <div style="display:flex;gap:4px">${filterTabs}</div>
            </div>
            <table class="history-table">
              <thead><tr><th>Čas</th><th>Od</th><th>Předmět</th><th>Typ</th><th>Výsledek</th><th></th></tr></thead>
              <tbody>${rows}</tbody>
            </table>
            ${pagination}`;
        } catch (_) {}
      }

      function toggleDetail(i) {
        const el = document.getElementById("detail-" + i);
        const arrow = document.getElementById("arrow-" + i);
        if (!el) return;
        const open = el.classList.toggle("open");
        if (arrow) arrow.classList.toggle("open", open);
      }

      async function moveSorterEmailToSpam(emailKey, ruleMode, button) {
        if (!emailKey) return;
        const originalText = button ? button.textContent : "";
        if (button) {
          button.disabled = true;
          button.textContent = "Přesouvám...";
        }
        try {
          const res = await fetch("/api/sorter/move-to-spam", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email_key: emailKey, rule_mode: ruleMode }),
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.detail || `HTTP ${res.status}`);
          const ruleLabel =
            data.rule_type === "from_address"
              ? "odesílatel"
              : data.rule_type === "content_hash"
                ? "typ obsahu"
                : data.rule_type;
          const nextFilter = _sorterFilter === "kept" ? "all" : _sorterFilter;
          setStatus(`Email přesunut. Naučeno jako ${ruleLabel}.`, "ok");
          await refreshSorterHistory(1, nextFilter);
        } catch (err) {
          if (button) {
            button.disabled = false;
            button.textContent = originalText;
          }
          setStatus(`Chyba: ${err.message}`, "error");
        }
      }

      async function removeSorterRule(emailKey, ruleType, ruleValue, button) {
        if (!emailKey || !ruleType || !ruleValue) return;
        const originalText = button ? button.textContent : "";
        if (button) {
          button.disabled = true;
          button.textContent = "Ruším...";
        }
        try {
          const res = await fetch("/api/sorter/remove-rule", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              email_key: emailKey,
              rule_type: ruleType,
              rule_value: ruleValue,
            }),
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.detail || `HTTP ${res.status}`);
          const nextFilter = _sorterFilter === "moved" ? "all" : _sorterFilter;
          setStatus("Pravidlo zrušeno a email vrácen do inboxu.", "ok");
          await refreshSorterHistory(1, nextFilter);
        } catch (err) {
          if (button) {
            button.disabled = false;
            button.textContent = originalText;
          }
          setStatus(`Chyba: ${err.message}`, "error");
        }
      }

      let _sorterPage = 1;
      let _sorterFilter = "all";

      async function refreshSorterHistory(page, filter) {
        if (page !== undefined) _sorterPage = page;
        if (filter !== undefined) {
          _sorterFilter = filter;
          _sorterPage = 1;
        }
        try {
          const res = await fetch(
            `/api/sorter-history?page=${_sorterPage}&per_page=50&filter=${_sorterFilter}`,
          );
          if (!res.ok) return;
          const data = await res.json();
          const el = document.getElementById("sorter-history-section");
          if (!data.total) {
            el.innerHTML = "";
            return;
          }

          const outcomeLabel = {
            kept: "✅ Ponecháno",
            moved: "📁 Přesunuto",
          };
          const methodLabel = {
            ai: "AI",
            headers: "Hlavičky",
            self: "Vlastní",
            rule: "Pravidlo",
            dashboard: "Dashboard",
          };

          const rows = data.items
            .map((item, i) => {
              const idx = "s" + i;
              const time = new Date(item.time).toLocaleString("cs-CZ", {
                day: "2-digit",
                month: "2-digit",
                hour: "2-digit",
                minute: "2-digit",
              });
              const outcomeCls =
                item.outcome === "kept"
                  ? "outcome-approved"
                  : "outcome-rejected";
              const label = outcomeLabel[item.outcome] || item.outcome;
              const method = methodLabel[item.method] || item.method;
              const moveButton =
                item.outcome === "kept" && item.email_key
                  ? `<div class="detail-actions">
                      <button
                        class="detail-action-btn"
                        onclick='event.stopPropagation(); moveSorterEmailToSpam(${JSON.stringify(item.email_key)}, "content", this)'
                      >
                        Jen tento typ
                      </button>
                      <button
                        class="detail-action-btn"
                        onclick='event.stopPropagation(); moveSorterEmailToSpam(${JSON.stringify(item.email_key)}, "sender", this)'
                      >
                        Vždy od odesílatele
                      </button>
                    </div>`
                  : "";
              const removeRuleButton =
                item.outcome === "moved" &&
                item.email_key &&
                item.rule_type &&
                item.rule_value
                  ? `<div class="detail-actions">
                      <button
                        class="detail-action-btn"
                        onclick='event.stopPropagation(); removeSorterRule(${JSON.stringify(item.email_key)}, ${JSON.stringify(item.rule_type)}, ${JSON.stringify(item.rule_value)}, this)'
                      >
                        Zrušit pravidlo
                      </button>
                    </div>`
                  : "";
              return `
              <tr class="history-row" onclick="toggleDetail('${idx}')">
                <td style="color:#555;white-space:nowrap">${esc(time)}</td>
                <td style="max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(item.from)}</td>
                <td style="max-width:240px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(item.subject)}</td>
                <td><span class="type-badge">${esc(method)}</span></td>
                <td><span class="outcome-badge ${outcomeCls}">${esc(label)}</span></td>
                <td style="text-align:right;padding-right:4px"><span class="chevron" id="arrow-${idx}">›</span></td>
              </tr>
              <tr class="history-detail" id="detail-${idx}">
                <td colspan="6">
                  <div class="detail-label">Původní email</div>
                  <div class="detail-text">${esc(item.body_display || item.body || "—")}</div>
                  ${moveButton}
                  ${removeRuleButton}
                </td>
              </tr>`;
            })
            .join("");

          let pagination = "";
          if (data.pages > 1) {
            const cur = data.page,
              total = data.pages;
            const pages = new Set(
              [1, total, cur, cur - 2, cur - 1, cur + 1, cur + 2].filter(
                (p) => p >= 1 && p <= total,
              ),
            );
            const sorted = [...pages].sort((a, b) => a - b);
            const btns = [];
            let prev = null;
            for (const p of sorted) {
              if (prev && p - prev > 1)
                btns.push(`<span style="color:#333;padding:4px 6px">…</span>`);
              btns.push(
                `<button class="page-btn${p === cur ? " active" : ""}" onclick="refreshSorterHistory(${p})">${p}</button>`,
              );
              prev = p;
            }
            pagination = `<div class="pagination">${btns.join("")}</div>`;
          }

          const filters = [
            { key: "all", label: "Vše" },
            { key: "kept", label: "Ponecháno" },
            { key: "moved", label: "Přesunuto" },
            { key: "ai", label: "AI" },
          ];
          const filterTabs = filters
            .map(
              (f) =>
                `<button class="page-btn${_sorterFilter === f.key ? " active" : ""}"
                onclick="refreshSorterHistory(1, '${f.key}')">${f.label}</button>`,
            )
            .join("");

          el.innerHTML = `
            <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
              <span class="section-label">🗂 Sorter (${data.total})</span>
              <div style="display:flex;gap:4px">${filterTabs}</div>
            </div>
            <table class="history-table">
              <thead><tr><th>Čas</th><th>Od</th><th>Předmět</th><th>Metoda</th><th>Výsledek</th><th></th></tr></thead>
              <tbody>${rows}</tbody>
            </table>
            ${pagination}`;
        } catch (_) {}
      }

      refresh();
      refreshHistory();
      refreshSorterHistory();
      setInterval(refresh, REFRESH_MS);
      setInterval(refreshHistory, 15000);
      setInterval(refreshSorterHistory, 15000);
    </script>
  </body>
</html>
